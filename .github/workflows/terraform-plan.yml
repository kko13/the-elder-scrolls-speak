name: terraform-plan

on:
  pull_request:
    paths:
      - 'infra/**'
      - 'backend/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - run: terraform fmt -check -recursive
        working-directory: infra

      # Stub Lambda packages so functions like filebase64sha256 evaluate.
      - name: Stub Lambda packages
        run: |
          mkdir -p backend/dist
          for n in ingestion tts api; do
            (cd /tmp && echo stub > stub.txt && zip -q "$GITHUB_WORKSPACE/backend/dist/$n.zip" stub.txt)
          done

      - name: terraform validate (no backend)
        working-directory: infra/envs/dev
        run: |
          terraform init -backend=false
          terraform validate

  plan:
    needs: validate
    runs-on: ubuntu-latest
    # Skip until the bootstrap (OIDC role + remote state) has been performed
    # and the corresponding GitHub Actions secrets/vars are set.
    env:
      ROLE_ARN: ${{ secrets.AWS_GHA_ROLE_ARN }}
    if: ${{ vars.TF_BACKEND_BUCKET != '' }}
    defaults:
      run:
        working-directory: infra/envs/dev
    steps:
      - uses: actions/checkout@v4

      - name: Skip if AWS role secret is unset
        if: env.ROLE_ARN == ''
        run: |
          echo "AWS_GHA_ROLE_ARN secret not set — skipping plan." >&2
          exit 0

      - uses: aws-actions/configure-aws-credentials@v4
        if: env.ROLE_ARN != ''
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: us-east-1

      - name: Stub Lambda packages
        if: env.ROLE_ARN != ''
        run: |
          mkdir -p ../../../backend/dist
          for n in ingestion tts api; do
            (cd /tmp && echo stub > stub.txt && zip -q "$GITHUB_WORKSPACE/backend/dist/$n.zip" stub.txt)
          done

      - uses: hashicorp/setup-terraform@v3
        if: env.ROLE_ARN != ''
        with:
          terraform_version: 1.9.0

      - name: terraform init + plan
        if: env.ROLE_ARN != ''
        env:
          TF_VAR_github_owner: ${{ github.repository_owner }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_BACKEND_BUCKET }}" \
            -backend-config="key=envs/dev/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ vars.TF_BACKEND_LOCK_TABLE }}"
          terraform plan -no-color -out=tfplan
